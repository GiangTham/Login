<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype Viewer — Ví dụ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-app:#eef0f3;
    --sidebar:#1c1d28;
    --sidebar-hover:#262837;
    --sidebar-active:#33283f;
    --accent:#e9b44c;
    --accent-2:#ff7a45;
    --text-hi:#f3efe2;
    --text-mid:#9c9aad;
    --text-low:#6b6a7c;
    --group-label:#5d5c70;
    --line:#2d2e3c;
    --canvas:#ffffff;
    --canvas-line:#e3e5ea;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:var(--font-body);
    background:var(--bg-app);
    color:#1c1d28;
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  /* ===== SIDEBAR ===== */
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--sidebar);
    color:var(--text-hi);
    height:100%;
    overflow-y:auto;
    border-right:1px solid var(--line);
  }
  .sidebar-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:22px 20px;
    border-bottom:1px solid var(--line);
  }
  .logo{
    width:36px;height:36px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--accent-2), var(--accent));
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
    flex-shrink:0;
  }
  .sidebar-title{
    font-family:var(--font-display);
    font-size:14.5px;
    font-weight:600;
    letter-spacing:0.01em;
  }
  .sidebar-sub{
    font-size:11.5px;
    color:var(--text-low);
    margin-top:1px;
  }

  .nav{padding:14px 10px 30px;}
  .group-label{
    font-family:var(--font-display);
    font-size:10.5px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--group-label);
    padding:16px 12px 6px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:11px;
    padding:9px 12px;
    border-radius:8px;
    color:var(--text-mid);
    font-size:13.5px;
    cursor:pointer;
    border-left:2px solid transparent;
    transition:background .15s ease, color .15s ease;
    user-select:none;
  }
  .nav-item:hover{background:var(--sidebar-hover); color:var(--text-hi);}
  .nav-item.active{
    background:var(--sidebar-active);
    color:var(--text-hi);
    border-left-color:var(--accent-2);
    font-weight:500;
  }
  .nav-icon{
    width:16px;text-align:center;
    font-size:14px;
    flex-shrink:0;
    opacity:0.85;
  }

  /* ===== MAIN ===== */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .topbar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 28px;
    background:var(--canvas);
    border-bottom:1px solid var(--canvas-line);
    flex-shrink:0;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:7px;
    padding:8px 14px;
    border-radius:8px;
    border:1px solid var(--canvas-line);
    background:#fff;
    font-family:var(--font-body);
    font-size:13px;
    font-weight:500;
    color:#33344a;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .nav-btn:hover{background:#f6f7f9; border-color:#cfd2da;}
  .nav-btn:disabled{opacity:0.4; cursor:not-allowed;}
  .crumb{
    font-family:var(--font-display);
    font-size:14px;
    font-weight:600;
    color:#23243a;
    padding:7px 4px;
  }
  .crumb-tag{
    font-size:11px;
    color:var(--text-low);
    background:#f1f1f5;
    border-radius:5px;
    padding:2px 7px;
    margin-right:8px;
    font-family:var(--font-display);
    letter-spacing:0.04em;
  }

  .canvas{
    flex:1;
    overflow:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:50px 30px;
    background:
      radial-gradient(circle at 50% 0%, rgba(233,180,76,0.05), transparent 55%),
      var(--bg-app);
  }

  /* ===== PHONE FRAME ===== */
  .phone{
    width:300px;
    height:632px;
    background:#0f1018;
    border-radius:40px;
    padding:10px;
    box-shadow:0 30px 60px -20px rgba(20,20,30,0.35), 0 0 0 1px rgba(0,0,0,0.04);
    flex-shrink:0;
  }
  .phone-screen{
    width:100%;height:100%;
    background:#fff;
    border-radius:30px;
    overflow:hidden;
    position:relative;
  }
  .screen-content{
    width:100%;height:100%;
    display:flex;
    flex-direction:column;
  }

  /* ===== SCREEN STYLES (mock app content) ===== */
  .scr-splash{
    background:linear-gradient(160deg, var(--accent-2), var(--accent));
    color:#fff;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    position:relative;
  }
  .scr-splash .badge{
    width:78px;height:78px;
    border-radius:20px;
    background:rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
    font-size:34px;
  }
  .scr-splash h1{font-family:var(--font-display); font-size:24px; margin:0;}
  .scr-splash p{font-size:13px; opacity:0.9; margin:0; text-align:center; padding:0 30px;}
  .scr-splash .loadbar{
    position:absolute; bottom:46px; left:40px; right:40px;
    height:3px; border-radius:2px; background:rgba(255,255,255,0.25);
  }
  .scr-splash .loadbar span{
    display:block; width:62%; height:100%;
    background:#fff; border-radius:2px;
  }

  .scr-app{flex:1; display:flex; flex-direction:column; background:#fafafb;}
  .scr-statusbar{height:0;}
  .scr-header{
    padding:22px 20px 16px;
    background:#fff;
    border-bottom:1px solid #eee;
  }
  .scr-header h2{font-family:var(--font-display); font-size:18px; margin:0 0 3px;}
  .scr-header p{font-size:12px; color:#8a8a98; margin:0;}
  .scr-body{flex:1; padding:18px 20px; overflow:auto;}

  /* login mock */
  .mock-field{margin-bottom:14px;}
  .mock-label{font-size:11.5px; color:#8a8a98; margin-bottom:6px; display:block;}
  .mock-input{
    width:100%; padding:11px 12px; border-radius:8px;
    border:1px solid #e2e2e8; font-size:13px; background:#fff;
    font-family:var(--font-body);
  }
  .mock-btn{
    width:100%; padding:12px; border-radius:8px; border:none;
    background:linear-gradient(135deg, var(--accent-2), var(--accent));
    color:#fff; font-weight:600; font-size:13.5px; margin-top:6px;
    font-family:var(--font-display);
  }
  .mock-link{
    text-align:center; font-size:12px; color:#8a8a98; margin-top:14px;
  }

  /* home mock */
  .stat-row{display:flex; gap:10px; margin-bottom:18px;}
  .stat-card{
    flex:1; background:#fff; border:1px solid #eee; border-radius:10px;
    padding:13px;
  }
  .stat-card .num{font-family:var(--font-display); font-size:20px; font-weight:700; color:#23243a;}
  .stat-card .lbl{font-size:11px; color:#8a8a98; margin-top:2px;}
  .list-item{
    display:flex; align-items:center; gap:12px;
    background:#fff; border:1px solid #eee; border-radius:10px;
    padding:12px; margin-bottom:10px;
  }
  .list-icon{
    width:34px; height:34px; border-radius:9px;
    background:#fdf1de; display:flex; align-items:center; justify-content:center;
    font-size:16px; flex-shrink:0;
  }
  .list-text .t1{font-size:13px; font-weight:600; color:#23243a;}
  .list-text .t2{font-size:11.5px; color:#8a8a98; margin-top:1px;}

  /* profile mock */
  .profile-head{display:flex; flex-direction:column; align-items:center; padding:24px 0 18px;}
  .avatar{
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent-2), var(--accent));
    margin-bottom:10px;
  }
  .profile-head .name{font-family:var(--font-display); font-weight:600; font-size:15px;}
  .profile-head .mail{font-size:11.5px; color:#8a8a98;}
  .menu-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 4px; border-bottom:1px solid #f0f0f3;
    font-size:13px; color:#33344a;
  }
  .menu-row span.arrow{color:#c4c4cc;}

  /* bottom tab bar for app screens */
  .tabbar{
    height:58px; background:#fff; border-top:1px solid #eee;
    display:flex; align-items:center; justify-content:space-around;
    flex-shrink:0;
  }
  .tab{font-size:10.5px; color:#b5b5c0; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tab.active{color:var(--accent-2); font-weight:600;}
  .tab .ic{font-size:16px;}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#cfd2da; border-radius:4px;}
  .sidebar ::-webkit-scrollbar-thumb{background:#3a3b4d;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-head">
    <div class="logo">🧠</div>
    <div>
      <div class="sidebar-title">App Demo — Screens</div>
      <div class="sidebar-sub">Ví dụ prototype viewer</div>
    </div>
  </div>

  <nav class="nav" id="navList">
    <div class="group-label">F0 — Shell</div>
    <div class="nav-item active" data-screen="splash">
      <span class="nav-icon">✦</span> Splash screen
    </div>
    <div class="nav-item" data-screen="login">
      <span class="nav-icon">⏵</span> Đăng nhập
    </div>

    <div class="group-label">F1 — App chính</div>
    <div class="nav-item" data-screen="home">
      <span class="nav-icon">⌂</span> Home dashboard
    </div>
    <div class="nav-item" data-screen="profile">
      <span class="nav-icon">◍</span> Profile
    </div>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <button class="nav-btn" id="prevBtn">← Trước</button>
    <button class="nav-btn" id="nextBtn">Tiếp →</button>
    <div class="crumb"><span class="crumb-tag" id="crumbTag">F0-01</span><span id="crumbTitle">Splash screen</span></div>
  </div>

  <div class="canvas">
    <div class="phone">
      <div class="phone-screen">
        <div class="screen-content" id="screenContent"></div>
      </div>
    </div>
  </div>
</main>

<script>
(function(){
  // Danh sách màn hình theo thứ tự duyệt — đây là phần bạn sẽ thay bằng list thật của bạn
  const screens = [
    { id:'splash',  tag:'F0-01', title:'Splash screen',   render: renderSplash },
    { id:'login',   tag:'F0-02', title:'Đăng nhập',       render: renderLogin },
    { id:'home',    tag:'F1-01', title:'Home dashboard',  render: renderHome },
    { id:'profile', tag:'F1-02', title:'Profile',         render: renderProfile },
  ];

  let current = 0;

  const screenContent = document.getElementById('screenContent');
  const crumbTag = document.getElementById('crumbTag');
  const crumbTitle = document.getElementById('crumbTitle');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const navItems = document.querySelectorAll('.nav-item');

  function show(index){
    current = index;
    const s = screens[index];
    screenContent.innerHTML = s.render();
    crumbTag.textContent = s.tag;
    crumbTitle.textContent = s.title;
    prevBtn.disabled = index === 0;
    nextBtn.disabled = index === screens.length - 1;

    navItems.forEach(item => {
      item.classList.toggle('active', item.dataset.screen === s.id);
    });
  }

  navItems.forEach((item, i) => {
    item.addEventListener('click', () => {
      const idx = screens.findIndex(s => s.id === item.dataset.screen);
      if (idx > -1) show(idx);
    });
  });

  prevBtn.addEventListener('click', () => { if (current > 0) show(current - 1); });
  nextBtn.addEventListener('click', () => { if (current < screens.length - 1) show(current + 1); });

  // ===== Render functions cho từng màn hình mock =====
  function renderSplash(){
    return `
      <div class="scr-splash">
        <div class="badge">🧠</div>
        <h1>App Demo ⭐</h1>
        <p>Trợ lý thông minh 24/7 của bạn</p>
        <div class="loadbar"><span></span></div>
      </div>
    `;
  }

  function renderLogin(){
    return `
      <div class="scr-app">
        <div class="scr-header">
          <h2>Đăng nhập</h2>
          <p>Nhập thông tin để tiếp tục</p>
        </div>
        <div class="scr-body">
          <div class="mock-field">
            <label class="mock-label">Email</label>
            <input class="mock-input" placeholder="ten@congty.com" disabled>
          </div>
          <div class="mock-field">
            <label class="mock-label">Mật khẩu</label>
            <input class="mock-input" type="password" placeholder="••••••••" disabled>
          </div>
          <button class="mock-btn">Đăng nhập</button>
          <p class="mock-link">Chưa có tài khoản? Tạo tài khoản</p>
        </div>
      </div>
    `;
  }

  function renderHome(){
    return `
      <div class="scr-app">
        <div class="scr-header">
          <h2>Xin chào, Giang 👋</h2>
          <p>Tổng quan hoạt động hôm nay</p>
        </div>
        <div class="scr-body">
          <div class="stat-row">
            <div class="stat-card"><div class="num">12</div><div class="lbl">Bài đã làm</div></div>
            <div class="stat-card"><div class="num">86%</div><div class="lbl">Độ chính xác</div></div>
          </div>
          <div class="list-item">
            <div class="list-icon">📘</div>
            <div class="list-text"><div class="t1">Bài tập Ngữ pháp</div><div class="t2">Còn 3 câu chưa hoàn thành</div></div>
          </div>
          <div class="list-item">
            <div class="list-icon">🎯</div>
            <div class="list-text"><div class="t1">Luyện phát âm</div><div class="t2">Mục tiêu hôm nay: 10 phút</div></div>
          </div>
          <div class="list-item">
            <div class="list-icon">📊</div>
            <div class="list-text"><div class="t1">Báo cáo tuần</div><div class="t2">Xem tiến độ chi tiết</div></div>
          </div>
        </div>
        <div class="tabbar">
          <div class="tab active"><span class="ic">⌂</span>Home</div>
          <div class="tab"><span class="ic">🎙</span>Luyện tập</div>
          <div class="tab"><span class="ic">◍</span>Hồ sơ</div>
        </div>
      </div>
    `;
  }

  function renderProfile(){
    return `
      <div class="scr-app">
        <div class="scr-body" style="padding-top:0;">
          <div class="profile-head">
            <div class="avatar"></div>
            <div class="name">Giang Tham</div>
            <div class="mail">giang@example.com</div>
          </div>
          <div class="menu-row">Thông tin cá nhân <span class="arrow">›</span></div>
          <div class="menu-row">Thông báo <span class="arrow">›</span></div>
          <div class="menu-row">Ngôn ngữ <span class="arrow">›</span></div>
          <div class="menu-row">Bảo mật <span class="arrow">›</span></div>
          <div class="menu-row" style="color:#d96c5f;">Đăng xuất</div>
        </div>
        <div class="tabbar">
          <div class="tab"><span class="ic">⌂</span>Home</div>
          <div class="tab"><span class="ic">🎙</span>Luyện tập</div>
          <div class="tab active"><span class="ic">◍</span>Hồ sơ</div>
        </div>
      </div>
    `;
  }

  show(0);
})();
</script>

</body>
</html>
